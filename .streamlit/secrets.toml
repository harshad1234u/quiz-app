# ─── Supabase Configuration (REQUIRED) ────────────────────────────────────
# Get these from: https://app.supabase.com → Your Project → Settings → API
SUPABASE_URL = ""
SUPABASE_KEY = ""

# ─── AI API Configuration (REQUIRED) ──────────────────────────────────────
# API_KEY is the primary key; NVIDIA_API_KEY is deprecated but still supported
API_KEY = ""
# NVIDIA_BASE_URL = "https://integrate.api.nvidia.com/v1"  # Optional
# NVIDIA_MODEL = "meta/llama-3.3-70b-instruct"              # Optional

# ─── Google OAuth (OPTIONAL) ──────────────────────────────────────────────
# Only needed if implementing Google login
# GOOGLE_CLIENT_ID = ""
# GOOGLE_CLIENT_SECRET = ""
# GOOGLE_REDIRECT_URI = ""
